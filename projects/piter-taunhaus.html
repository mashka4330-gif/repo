<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таунхаус, Всеволожск — ВЕРТИКАЛЬ</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#262626;--ink-soft:#404040;--ink-muted:#6f6c72;
  --paper:#f5f4f1;--white:#ffffff;
  --tc:#b06850;--tc-l:#c4806a;
  --f-sans:'Open Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--f-sans);background:var(--paper);color:var(--ink);overflow-x:hidden;line-height:1.6}

/* NAV */
#topnav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2.5rem;height:72px;
  background:rgba(255,255,255,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(28,28,27,.07);
  transition:all .3s;
}
.logo-link{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
.logo-svg-inline{height:90px;width:auto;display:block;color:var(--ink);transition:color .3s}
.nav-back{
  display:flex;align-items:center;gap:.5rem;
  font-size:12px;letter-spacing:.15em;text-transform:uppercase;
  color:var(--ink-muted);text-decoration:none;transition:color .2s;
}
.nav-back:hover{color:var(--tc)}
.nav-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* HERO */
.proj-hero{
  height:70vh;min-height:480px;position:relative;overflow:hidden;
  margin-top:72px;
}
.proj-hero img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.proj-hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(10,8,6,.7) 0%,rgba(10,8,6,.1) 60%,transparent 100%);
}
.proj-hero-title{
  position:absolute;bottom:0;left:0;right:0;padding:3rem 4rem;
}
.proj-tag{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--tc-l);font-weight:600;margin-bottom:.6rem}
.proj-name{font-size:clamp(2rem,4vw,3.2rem);font-weight:800;color:var(--white);line-height:1.1;margin-bottom:.5rem}
.proj-meta{font-size:13px;color:rgba(255,255,255,.6);letter-spacing:.05em}

/* LAYOUT */
.proj-body{max-width:1200px;margin:0 auto;padding:4rem 2rem 6rem}

/* INFO ROW */
.proj-info-row{
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:2rem;
  padding:2.5rem 0;border-top:1px solid rgba(28,28,27,.1);border-bottom:1px solid rgba(28,28,27,.1);
  margin-bottom:3rem;
}
.proj-info-item{}
.proj-info-label{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:.35rem}
.proj-info-value{font-size:15px;font-weight:600;color:var(--ink)}

/* DESCRIPTION */
.proj-desc-section{margin-bottom:3.5rem}
.proj-desc-section h2{font-size:1.4rem;font-weight:700;margin-bottom:1rem;color:var(--ink)}
.proj-desc-text{
  font-size:15px;line-height:1.8;color:var(--ink-soft);
  max-width:720px;
}
.proj-desc-placeholder{
  border:2px dashed rgba(28,28,27,.12);border-radius:8px;
  padding:2rem;color:var(--ink-muted);font-size:13px;
  text-align:center;letter-spacing:.05em;
}

/* GALLERY */
.proj-gallery-section{margin-bottom:3.5rem}
.proj-gallery-section h2{font-size:1.4rem;font-weight:700;margin-bottom:1.5rem;color:var(--ink)}
.proj-gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.proj-gallery-item{
  aspect-ratio:4/3;overflow:hidden;cursor:pointer;border-radius:4px;
  position:relative;
}
.proj-gallery-item.wide{grid-column:span 2}
.proj-gallery-item img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .5s ease;
}
.proj-gallery-item:hover img{transform:scale(1.04)}

/* DESCRIPTION + PLAN ROW */
.proj-desc-plan-row{display:grid;grid-template-columns:1fr 1fr;gap:3rem;margin-bottom:3.5rem;align-items:start}

/* PLAN */
.proj-plan-section{margin-bottom:0}
.proj-plan-section h2{font-size:1.4rem;font-weight:700;margin-bottom:1rem;color:var(--ink)}

/* LIGHTBOX */
.gal-wrap{
  position:fixed;inset:0;z-index:400;
  background:rgba(8,6,4,.96);backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;
}
.gal-wrap.open{display:flex}
.gal-inner{position:relative;max-width:92vw;max-height:92vh;display:flex;align-items:center;gap:1rem}
.gal-img-wrap{position:relative;text-align:center}
.gal-img-wrap img{max-width:82vw;max-height:88vh;object-fit:contain;display:block;border-radius:2px}
.gal-btn{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.7);font-size:20px;width:44px;height:44px;
  border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;flex-shrink:0;
}
.gal-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.gal-close{
  position:absolute;top:-2.8rem;right:0;background:none;border:none;
  color:rgba(255,255,255,.5);font-size:28px;cursor:pointer;line-height:1;transition:color .2s;
}
.gal-close:hover{color:#fff}
.gal-counter{
  position:absolute;bottom:-2rem;left:0;right:0;text-align:center;
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.35);
}

@media(max-width:768px){
  .proj-hero-title{padding:2rem 1.5rem}
  .proj-body{padding:2rem 1rem 4rem}
  .proj-info-row{grid-template-columns:1fr 1fr;gap:1.2rem}
  .proj-desc-plan-row{grid-template-columns:1fr;gap:2rem}
  .proj-gallery{grid-template-columns:1fr 1fr;gap:6px}
  .proj-gallery-item.wide{grid-column:span 1}
}
</style>
</head>

<!-- HERO -->
<div class="proj-hero">
  <img src="../uploads/piter/living2.jpg" alt="Таунхаус Всеволожск">
  <div class="proj-hero-overlay"></div>
  <div class="proj-hero-title">
    <div class="proj-tag">Жилой · Санкт-Петербург</div>
    <div class="proj-name">Таунхаус, Всеволожск</div>
    <div class="proj-meta">3 этажа · 140 м²</div>
  </div>
</div>

<div class="proj-body">

  <!-- INFO -->
  <div class="proj-info-row">
    <div class="proj-info-item">
      <div class="proj-info-label">Тип</div>
      <div class="proj-info-value">Таунхаус</div>
    </div>
    <div class="proj-info-item">
      <div class="proj-info-label">Площадь</div>
      <div class="proj-info-value">140 м²</div>
    </div>
    <div class="proj-info-item">
      <div class="proj-info-label">Этажей</div>
      <div class="proj-info-value">3</div>
    </div>
    <div class="proj-info-item">
      <div class="proj-info-label">Город</div>
      <div class="proj-info-value">Всеволожск, СПб</div>
    </div>
  </div>

  <!-- DESCRIPTION + PLAN -->
  <div class="proj-desc-plan-row">
    <div class="proj-desc-section">
      <h2>О проекте</h2>
      <div class="proj-desc-placeholder">Описание проекта появится здесь</div>
    </div>
    <div class="proj-plan-section">
      <h2>Планировка</h2>
      <div class="proj-desc-placeholder">Планировка появится здесь</div>
    </div>
  </div>

  <!-- GALLERY -->
  <div class="proj-gallery-section">
    <h2>Визуализации</h2>
    <div class="proj-gallery">
      <div class="proj-gallery-item wide" onclick="openLb(0)"><img src="../uploads/piter/living2.jpg" alt="Гостиная"></div>
      <div class="proj-gallery-item" onclick="openLb(1)"><img src="../uploads/piter/hall1.jpg" alt="Холл"></div>
      <div class="proj-gallery-item" onclick="openLb(2)"><img src="../uploads/piter/living1.jpg" alt="Гостиная-кухня"></div>
      <div class="proj-gallery-item" onclick="openLb(3)"><img src="../uploads/piter/living3.jpg" alt="Кухня"></div>
      <div class="proj-gallery-item wide" onclick="openLb(4)"><img src="../uploads/piter/hall2.jpg" alt="Холл 2"></div>
      <div class="proj-gallery-item" onclick="openLb(5)"><img src="../uploads/piter/bedroom1.jpg" alt="Спальня"></div>
      <div class="proj-gallery-item" onclick="openLb(6)"><img src="../uploads/piter/bedroom2.jpg" alt="Спальня 2"></div>

      <div class="proj-gallery-item" onclick="openLb(9)"><img src="../uploads/piter/study.jpg" alt="Кабинет"></div>
      <div class="proj-gallery-item" onclick="openLb(10)"><img src="../uploads/piter/floor1.jpg" alt="1 этаж"></div>
    </div>

</div>

<!-- LIGHTBOX -->
<div class="gal-wrap" id="lb" onclick="lbBgClose(event)">
  <div class="gal-inner">
    <button class="gal-btn" onclick="lbStep(-1)">&#8592;</button>
    <div class="gal-img-wrap">
      <button class="gal-close" onclick="closeLb()">×</button>
      <img id="lbImg" src="" alt="">
      <div class="gal-counter" id="lbCounter"></div>
    </div>
    <button class="gal-btn" onclick="lbStep(1)">&#8594;</button>
  </div>
</div>

<script>
const imgs = [
  '../uploads/piter/living2.jpg',
  '../uploads/piter/hall1.jpg',
  '../uploads/piter/living1.jpg',
  '../uploads/piter/living3.jpg',
  '../uploads/piter/hall2.jpg',
  '../uploads/piter/bedroom1.jpg',
  '../uploads/piter/bedroom2.jpg',
  '../uploads/piter/bathroom1.jpg',
  '../uploads/piter/bathroom2.jpg',
  '../uploads/piter/study.jpg',
  '../uploads/piter/floor1.jpg',
];
let cur = 0;
function openLb(i){ cur=i; render(); document.getElementById('lb').classList.add('open'); document.body.style.overflow='hidden'; }
function closeLb(){ document.getElementById('lb').classList.remove('open'); document.body.style.overflow=''; }
function lbBgClose(e){ if(e.target===document.getElementById('lb')) closeLb(); }
function lbStep(d){ cur=(cur+d+imgs.length)%imgs.length; render(); }
function render(){ document.getElementById('lbImg').src=imgs[cur]; document.getElementById('lbCounter').textContent=(cur+1)+' / '+imgs.length; }
document.addEventListener('keydown',e=>{ if(!document.getElementById('lb').classList.contains('open')) return; if(e.key==='ArrowRight') lbStep(1); if(e.key==='ArrowLeft') lbStep(-1); if(e.key==='Escape') closeLb(); });
</script>
